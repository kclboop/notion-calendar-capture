name: Capture Notion Calendar

on:
  schedule:
    - cron: '*/10 * * * *'

  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps

      - name: Capture calendar
        env:
          NOTION_EMAIL: ${{ secrets.NOTION_EMAIL }}
          NOTION_PASSWORD: ${{ secrets.NOTION_PASSWORD }}
          NOTION_CALENDAR_URL: ${{ secrets.NOTION_CALENDAR_URL }}
        run: node capture.js

      - name: Commit updated screenshot
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add calendar.png
          git commit -m "update calendar" || echo "No changes"

          git push
